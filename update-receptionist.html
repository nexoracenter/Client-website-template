<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Your AI Receptionist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080c14;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #0f1520;
      border: 1px solid #1e2d45;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 540px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00d4ff;
      box-shadow: 0 0 10px #00d4ff;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00d4ff;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7a99;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #a0aec0;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      background: #141c2e;
      border: 1px solid #1e2d45;
      border-radius: 10px;
      color: #e8eaf0;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      min-height: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #00d4ff;
    }

    textarea::placeholder {
      color: #3a4a66;
    }

    .char-count {
      font-size: 12px;
      color: #3a4a66;
      text-align: right;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.99); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .status.success {
      display: flex;
      background: #0a2a1a;
      border: 1px solid #00c77a;
      color: #00c77a;
    }

    .status.error {
      display: flex;
      background: #2a0a0a;
      border: 1px solid #ff4f4f;
      color: #ff4f4f;
    }

    .status-icon { font-size: 18px; }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #1e2d45;
      font-size: 12px;
      color: #3a4a66;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Nexora</span>
    </div>

    <h1>Update Your AI Receptionist</h1>
    <p class="subtitle">Type your new instructions below and tap Save. Your receptionist will update within seconds.</p>

    <label for="prompt">Receptionist Instructions</label>
    <textarea
      id="prompt"
      placeholder="Example: You are Maria, a friendly receptionist for Sunshine Dental. Greet callers warmly, answer questions about our hours (Mon–Fri 9am–5pm), and offer to book appointments..."
    ></textarea>
    <div class="char-count"><span id="count">0</span> characters</div>

    <button id="saveBtn" onclick="submitPrompt()">Save Changes</button>

    <div class="status success" id="successMsg">
      <span class="status-icon">✅</span>
      <span>Your AI receptionist has been updated!</span>
    </div>
    <div class="status error" id="errorMsg">
      <span class="status-icon">❌</span>
      <span id="errorText">Something went wrong. Please try again.</span>
    </div>

    <div class="footer">Powered by Nexora &nbsp;·&nbsp; nexoracenter.co</div>
  </div>

  <script>
    const textarea = document.getElementById('prompt');
    const countEl = document.getElementById('count');

    textarea.addEventListener('input', () => {
      countEl.textContent = textarea.value.length;
    });

    async function submitPrompt() {
      const prompt = textarea.value.trim();
      if (!prompt) {
        alert('Please enter your receptionist instructions first.');
        return;
      }

      const btn = document.getElementById('saveBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Saving…';
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('https://nexoracenterhq.app.n8n.cloud/webhook/retell-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ systemPrompt: prompt })
        });

        if (response.ok) {
          successMsg.style.display = 'flex';
          textarea.value = '';
          countEl.textContent = '0';
        } else {
          document.getElementById('errorText').textContent = 'Server error (' + response.status + '). Please try again.';
          errorMsg.style.display = 'flex';
        }
      } catch (err) {
        document.getElementById('errorText').textContent = 'Could not connect. Check your internet and try again.';
        errorMsg.style.display = 'flex';
      }

      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  </script>
</body>
</html>
